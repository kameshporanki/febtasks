<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Slider Carousel</title>
<style>
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f2f2f2;
    }

    .slider {
        width: 800px;
        height: 400px;
        overflow: hidden;
        position: relative;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .slides {
    display: flex;
    transition: transform 0.6s ease-in-out;
}

.slide {
    min-width: 100%;
    height: 400px;
    position: relative;
}
    .slide img {
        width: 100%;
        height: 100%; 
        object-fit: contain;
        display: block;
    }

    .content {
        position: absolute;
        bottom: 40px;
        left: 40px;
        color: #fff;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
    }

    .content h2 {
        font-size: 32px;
        margin-bottom: 10px;
        color:black;
    }

    .content button {
        padding: 10px 20px;
        border: none;
        background: #ff9800;
        color: white;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .content button:hover {
        background: #e68900;
    }

    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0,0,0,0.4);
        color: white;
        border: none;
        font-size: 24px;
        width: 50px;
        height: 50px;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background 0.3s;
    }

    .nav-btn:hover {
        background: rgba(0,0,0,0.8);
    }

    .prev { left: 20px; }
    .next { right: 20px; }
</style>
</head>
<body>

<div class="slider">
    <div class="slides" id="slides">

        <div class="slide">
            <img src="./images/team meetings.avif" alt="Team Meetings">
            <div class="content">
                <h2>Team Meetings</h2>
                <button>Explore</button>
            </div>
        </div>

        <div class="slide">
            <img src="./images/collaboration.jfif" alt="Collaboration">
            <div class="content">
                <h2>Collaboration</h2>
                <button>Learn More</button>
            </div>
        </div>

        <div class="slide">
            <img src="./images/innovation.avif" alt="Innovation Sessions">
            <div class="content">
                <h2>Innovation Sessions</h2>
                <button>Book Now</button>
            </div>
        </div>

        <div class="slide">
            <img src="./images/premium_vector-1682303288962-7fb57d457004.jfif" alt="Celebrations">
            <div class="content">
                <h2>Celebrations</h2>
                <button>Discover</button>
            </div>
        </div>

        <div class="slide">
            <img src="./images/work life balance.jfif" alt="Work Life Balance">
            <div class="content">
                <h2>Work Life Balance</h2>
                <button>View More</button>
            </div>
        </div>

    </div>

    <button class="nav-btn prev" onclick="prevSlide()">◄</button>
    <button class="nav-btn next" onclick="nextSlide()">►</button>
</div>

<script>
    
    let index = 0;
    const slides = document.getElementById("slides");
    const totalSlides = document.querySelectorAll(".slide").length;
    const slider = document.querySelector(".slider");

    function showSlide() {
        slides.style.transform = `translateX(-${index * 100}%)`;
    }

    function nextSlide() {
        index = (index + 1) % totalSlides;
        showSlide();
    }

    function prevSlide() {
        index = (index - 1 + totalSlides) % totalSlides;
        showSlide();
    }

    let autoSlide = setInterval(nextSlide, 3000);

    slider.addEventListener("mouseenter", () => {
        clearInterval(autoSlide);
    });

    slider.addEventListener("mouseleave", () => {
        autoSlide = setInterval(nextSlide, 3000);
    });
</script>


</body>
</html>
